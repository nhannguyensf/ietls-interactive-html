<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0284c7" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/app-icon.svg" type="image/svg+xml" />
  <title>IELTS Practice</title>
  <style>
    :root {
      --bg: #f5fbff;
      --text: #1f2933;
      --muted: #64748b;
      --primary: #0284c7;
      --primary-dark: #0369a1;
      --accent: #14b8a6;
      --border: #dbeafe;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      padding: 28px 20px;
    }

    .inner {
      width: min(100%, 980px);
      margin: 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin-top: 6px;
      opacity: 0.92;
    }

    main {
      width: min(100%, 980px);
      margin: 28px auto;
      padding: 0 20px;
    }

    .test-list {
      display: grid;
      gap: 14px;
    }

    .test-link {
      display: block;
      padding: 18px 20px;
      color: inherit;
      text-decoration: none;
      background: white;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .test-link:hover {
      border-color: var(--primary);
      box-shadow: 0 10px 24px rgba(2, 132, 199, 0.12);
    }

    .test-link strong {
      display: block;
      margin-bottom: 4px;
      color: var(--primary-dark);
      font-size: 18px;
    }

    .test-link span {
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div class="inner">
      <h1>IELTS Practice</h1>
      <div class="subtitle">Listening and reading practice tests</div>
    </div>
  </header>

  <main>
    <div class="test-list">
      <a class="test-link" href="app/listening_test.html">
        <strong>Listening Practice</strong>
        <span>VOL 7 TEST 6</span>
      </a>
      <a class="test-link" href="app/reading_test.html">
        <strong>Reading Practice</strong>
        <span>VOL 8 TEST 10</span>
      </a>
    </div>
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
